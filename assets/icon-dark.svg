<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background for favicons / avatars -->
  <rect width="64" height="64" rx="14" fill="#0A1628"/>

  <!-- Three bars: cost tiers — short (cheap), medium, marathon (expensive) -->
  <rect x="9"  y="48" width="13" height="10" rx="2.5" fill="#2f9e44"/>
  <rect x="26" y="36" width="13" height="22" rx="2.5" fill="#e67700"/>
  <rect x="43" y="10" width="13" height="48" rx="2.5" fill="#e03131"/>

  <!-- Baseline -->
  <line x1="7" y1="59" x2="57" y2="59" stroke="#495057" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X-ray scan beam cutting across all three bars -->
  <line x1="7" y1="37" x2="57" y2="37" stroke="#00D9FF" stroke-width="1.5" stroke-dasharray="4 2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Scanner head (moving left side) -->
  <circle cx="7" cy="37" r="3" fill="#00D9FF"/>
</svg>
