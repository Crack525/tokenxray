<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Bar chart icon: three cost-tier bars -->
  <rect x="14" y="72" width="12" height="8"  rx="2" fill="#2f9e44"/>
  <rect x="30" y="58" width="12" height="22" rx="2" fill="#e67700"/>
  <rect x="46" y="28" width="12" height="52" rx="2" fill="#e03131"/>

  <!-- Baseline -->
  <line x1="12" y1="81" x2="64" y2="81" stroke="#495057" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X-ray scan beam -->
  <line x1="10" y1="62" x2="66" y2="62" stroke="#00D9FF" stroke-width="1.5" stroke-dasharray="4 2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Scanner head -->
  <circle cx="10" cy="62" r="3" fill="#00D9FF"/>

  <!-- Wordmark: "token" light + "xray" cyan -->
  <text x="86" y="69" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="38" font-weight="500">
    <tspan fill="#A0A0A0">token</tspan><tspan fill="#00D9FF">xray</tspan>
  </text>
</svg>
